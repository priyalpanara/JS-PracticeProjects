<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<body>
    <p id="display">0</p>
    <label for="StartValue">Start Value:</label>
    <input type="text" id="StartValue" value="0">
    <button id="SetStartBtn">Set Start</button>
    <br>
    <label for="EndValue">End Value:</label>
    <input type="text" id="EndValue" value="0">
    <button id="SetEndBtn">Set End</button>
    <br>
    <br>
    <button id="IncrementBtn">Increment</button>
    <button id="DecrementBtn">Decrement</button>
    <br>
    <button id="ResetBtn">Reset</button>
</body>
<script src='script.js'></script>
</html>
